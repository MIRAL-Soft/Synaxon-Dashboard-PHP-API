name: CI

on:
  push:
    branches: [main, API-v1]
  pull_request:
    branches: [main, API-v1]

permissions:
  contents: read

jobs:
  test:
    name: PHPUnit / PHPStan / CS — PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, json, openssl, curl, fileinfo
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: vendor-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: vendor-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHP-CS-Fixer (check)
        run: composer fmt:check

      - name: Run PHPStan (level 8)
        run: composer analyse

      - name: Run unit tests
        run: composer test
