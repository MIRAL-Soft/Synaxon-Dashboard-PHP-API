name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release from tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"

          # Pull the section between "## [<version>]" and the next "## [" header.
          notes=$(awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]"  { capture = 1; next }
            capture && /^## \[/      { exit }
            capture                  { print }
          ' CHANGELOG.md)

          if [ -z "$notes" ]; then
            notes="Release ${tag}. See CHANGELOG.md for full details."
          fi

          {
            echo "notes<<RELEASE_NOTES_EOF"
            echo "$notes"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
